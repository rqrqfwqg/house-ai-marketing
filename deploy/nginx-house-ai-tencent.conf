# ============================================================
# house-ai 房屋租赁AI营销系统 — 腾讯云专属 nginx 配置（完整 80/443 server 块）
# 适用：腾讯云 CVM / 轻量应用服务器，独立子域名场景（如 house-ai.your-domain）
# 部署：把本文件放到 /etc/nginx/conf.d/ 或 sites-enabled/，nginx -t 后 reload
# 前置：已按 DEPLOY.md 第九章完成 安全组/防火墙、DNSPod、SSL 证书、系统初始化
# 说明：本文件为「独立 server 块」；若与 tools-management 同域子路径共存，请勿单独 include 本文件，
#       改为把 deploy/nginx-house-ai.conf 的 location 粘进 tools-management 现有 80/443 server。
# 安全：后端 8000 / Chrome 9222 仅绑 127.0.0.1，绝不对外；绝不开放 53/3000/31059。
# 占位：your-domain 与 /etc/nginx/ssl/house-ai/*.pem 均需替换为你自己的域名与证书路径。
# ============================================================

# —— HTTP：全量 301 跳转到 HTTPS ——
server {
    listen 80;
    listen [::]:80;
    server_name your-domain;   # 占位：改为你的域名（与 DNSPod 解析、SSL 证书一致）

    # 腾讯云：HTTP 仅用于 redirects，直接 301 到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# —— HTTPS：主 server 块 ——
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain;   # 占位：改为你的域名

    # —— 腾讯云免费 DV 证书（Nginx 格式，DEPLOY.md 9.4 下载部署）——
    ssl_certificate     /etc/nginx/ssl/house-ai/fullchain.pem;   # 占位：替换为实际证书路径
    ssl_certificate_key /etc/nginx/ssl/house-ai/privkey.pem;     # 占位：替换为实际私钥路径

    # —— TLS 协议与加密套件加固 ——
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # —— OCSP Stapling（可选，提升握手性能；需 resolver）——
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 119.29.29.29 223.5.5.5 valid=300s;   # 公共 DNS，可改
    resolver_timeout 5s;

    # —— 安全响应头 ——
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # —— 复用既有 location 片段 ——
    # 该文件内含：/house-ai API 反代(剥离前缀)、/house-ai/uploads 反代、
    # deny /house-ai/api/docs、前端 SPA alias。请勿改动其 deny docs 与前缀剥离逻辑。
    # 若你把 location 片段放到了别处，请修改下面 include 的绝对路径。
    include /opt/house-ai/deploy/nginx-house-ai.conf;
}
