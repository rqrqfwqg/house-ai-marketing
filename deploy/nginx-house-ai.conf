# ============================================================
# house-ai 房屋租赁AI营销系统 — nginx 片段
# 部署方式：子路径 /house-ai/，复用 tools-management 的 80/443 server 块
# 使用：将下方 location 块粘贴进现有 80/443 的 server { } 内，或 include 本文件
# 后端：127.0.0.1:8000（仅本机，由 nginx 反代；绝不暴露到公网）
# 前置：确认本机已存在 tools-management 的 80/443 server 块
# ============================================================

# —— 后端 API：剥离 /house-ai 前缀，保留 /api/v1 ——
location ~ ^/house-ai/(api/.*)$ {
    proxy_pass http://127.0.0.1:8000/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 20m;   # 房源图片上传
}

# —— 上传图片（后端挂载在 /house-ai/uploads）——
location ~ ^/house-ai/(uploads/.*)$ {
    proxy_pass http://127.0.0.1:8000/house-ai/$1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# —— 不对外暴露后端 API 文档（避免泄露接口清单）——
location = /house-ai/api/docs { deny all; }
location = /house-ai/api/openapi.json { deny all; }

# —— 前端 SPA（构建产物 frontend-vue/dist）——
location /house-ai/ {
    alias /opt/house-ai/frontend-vue/dist/;
    index index.html;
    try_files $uri $uri/ @houseai_spa;
}
location @houseai_spa {
    alias /opt/house-ai/frontend-vue/dist/;
    try_files /index.html =404;
}
